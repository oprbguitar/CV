<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CV de Oscar Pierre Reyes Briones · Ingeniero industrial · Procesos, analítica e IA aplicada." />
    <title>Oscar Pierre Reyes Briones · Prototipos 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Archivo:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1B2A4E;
        font-family: "Inter", system-ui, sans-serif;
        overflow: hidden;
      }
      * { box-sizing: border-box; }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #frame {
        width: 1440px;
        height: 900px;
        transform-origin: center center;
        box-shadow: 0 30px 90px rgba(0,0,0,.35);
        position: relative;
      }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="stage">
      <div id="frame"><div id="root"></div></div>
    </div>

    <script type="text/babel" src="variants/shared.jsx"></script>
    <script type="text/babel" src="variants/tool-icons.jsx"></script>
    <script type="text/babel" src="variants/C-bauhaus.jsx"></script>
    <script type="text/babel">
      const { BauhausCV } = window;
      ReactDOM.createRoot(document.getElementById("root")).render(<BauhausCV />);
    </script>
    <script>
      // Escala 1440×900 al viewport — mantiene relación, letterbox automático.
      const frame = document.getElementById("frame");
      function fit() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        const s = Math.min(W / 1440, H / 900);
        frame.style.transform = `scale(${s})`;
      }
      window.addEventListener("resize", fit);
      fit();
    </script>
  </body>
</html>
