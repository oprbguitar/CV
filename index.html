    <style>
      :root{color-scheme:light dark}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,sans-serif;background:#06172e}body{overflow-x:hidden}#stage{min-height:100dvh;padding:clamp(10px,1.6vw,22px);display:grid;place-items:center}#frame{width:min(1440px,100%)}
      .cv-shell{min-height:calc(100dvh - 32px);display:grid;grid-template-columns:300px minmax(0,1fr)390px;grid-template-rows:auto 500px 320px auto;grid-template-areas:"top top top" "profile main rail" "skills main rail" "values values values";gap:14px;padding:18px;border-radius:18px;background:var(--bg);color:var(--ink);box-shadow:0 28px 80px rgba(0,0,0,.28)}
      a{color:inherit;text-decoration:none}.topbar{grid-area:top;display:flex;align-items:center;gap:18px}.brand{font-family:Archivo,sans-serif;font-size:34px;font-weight:900;letter-spacing:-2px;color:var(--navy)}.top-meta{font-size:12px;font-weight:900;letter-spacing:3px;text-transform:uppercase;border-left:1px solid var(--line);padding-left:18px}.top-meta b{color:var(--clay)}.topbar nav{margin-left:auto;display:flex;gap:12px;align-items:center}.topbar a,.topbar button{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--clay);background:transparent;color:var(--ink);padding:10px 16px;border-radius:7px;font-weight:900;cursor:pointer}.topbar button{background:var(--navy);color:var(--cream);border-color:var(--navy)}

      .skills-card{grid-area:skills;padding:18px}.skills-card article{margin:14px 0}.skills-card article div{display:flex;justify-content:space-between;font-weight:900}.skills-card article span{color:var(--clay);font-size:18px}.skills-card i{display:block;height:7px;background:color-mix(in srgb,var(--line) 65%,transparent);border-radius:999px;margin:7px 0}.skills-card i b{display:block;height:100%;background:linear-gradient(90deg,var(--clay),var(--orange));border-radius:inherit}.skills-card p{margin:0;color:var(--muted);font-size:12px}.value-strip{grid-area:values;display:flex;justify-content:space-around;gap:14px;background:var(--navy);color:var(--cream);border-radius:8px;padding:14px}.value-strip span{display:flex;gap:8px;align-items:center;font-size:12px}
