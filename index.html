<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CV de Oscar Pierre Reyes Briones · Ingeniero industrial · Procesos, analítica e IA aplicada." />
    <title>Oscar Pierre Reyes Briones · Prototipos 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Archivo:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #1B2A4E;
        font-family: "Inter", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      #stage {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: clamp(10px, 2vw, 24px);
      }
      #frame {
        width: min(1440px, 100%);
        min-height: min(900px, calc(100dvh - 20px));
        box-shadow: 0 30px 90px rgba(0,0,0,.35);
        position: relative;
      }
      .bauhaus-cv {
        width: 100%;
        min-height: inherit;
        background: var(--ivory);
        color: var(--ink);
        padding: clamp(12px, 2vw, 24px);
        display: grid;
        grid-template-columns: minmax(230px, 380px) 1fr 1fr minmax(250px, 340px);
        grid-template-rows: auto minmax(250px, 280px) minmax(230px, 264px) minmax(220px, 244px);
        grid-template-areas:
          "topbar topbar topbar topbar"
          "photo hero hero metrics"
          "photo norma norma norma"
          "skills skills proj tools";
        gap: clamp(10px, 1.2vw, 14px);
        overflow: hidden;
      }
      .bauhaus-cv a { color: inherit; text-decoration: none; }
      .topbar { grid-area: topbar; display: flex; align-items: center; gap: 18px; padding: 0 8px; min-width: 0; }
      .brand { font-family: "Archivo", sans-serif; font-weight: 900; font-size: clamp(24px, 2vw, 30px); letter-spacing: -1px; line-height: 1; flex-shrink: 0; }
      .brand span { color: var(--clay); }
      .topline { width: 1px; height: 24px; background: var(--line); flex-shrink: 0; }
      .kicker { font-size: 10px; letter-spacing: 2.2px; font-weight: 800; text-transform: uppercase; color: var(--ink); }
      .kicker b { color: var(--clay); }
      .top-actions { margin-left: auto; display: flex; align-items: center; gap: 9px; min-width: 0; }
      .top-link, .theme-toggle { border: 1px solid var(--line); background: color-mix(in srgb, var(--paper) 82%, transparent); color: var(--ink); display: inline-flex; align-items: center; gap: 6px; padding: 8px 10px; font-size: 11px; font-weight: 800; cursor: pointer; }
      .theme-toggle { font-family: inherit; }
      .photo-block { grid-area: photo; position: relative; background: var(--clay); padding: 16px; overflow: hidden; min-height: 280px; }
      .photo-orbit { position: absolute; top: -120px; right: -120px; width: 280px; height: 280px; border-radius: 50%; background: var(--mustard); opacity: .95; }
      .photo-block img { position: relative; z-index: 1; width: 100%; height: 100%; min-height: 250px; object-fit: cover; object-position: 50% 22%; filter: contrast(1.04) saturate(.9); }
      .hero-block { grid-area: hero; background: var(--navy); color: var(--cream); padding: clamp(22px, 2.5vw, 32px); position: relative; overflow: hidden; }
      .hero-bar { position: absolute; inset: 0 auto 0 0; width: 6px; background: var(--mustard); }
      .eyebrow { margin: 0; font-size: 10px; letter-spacing: 2.6px; font-weight: 800; text-transform: uppercase; color: var(--mustard); }
      .hero-block h1, .norma-block h2 { font-family: "Archivo", sans-serif; font-weight: 900; line-height: .86; letter-spacing: -.05em; margin: 10px 0 8px; }
      .hero-block h1 { font-size: clamp(54px, 6vw, 82px); color: var(--cream); }
      .hero-block h1 span, .norma-block h2 span { color: var(--mustard); }
      .role-line { margin: 0 0 10px; color: color-mix(in srgb, var(--cream) 86%, transparent); font-size: 13px; font-weight: 800; }
      .hero-summary { max-width: 560px; margin: 0; font-size: clamp(13px, 1.1vw, 15px); line-height: 1.5; color: color-mix(in srgb, var(--cream) 86%, transparent); }
      .watermark { position: absolute; right: 24px; bottom: 18px; font-family: "Archivo", sans-serif; font-size: clamp(48px, 5vw, 70px); color: color-mix(in srgb, var(--mustard) 18%, transparent); line-height: 1; }
      .metrics-block { grid-area: metrics; background: var(--paper); border: 1px solid var(--line); padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 7px; min-height: 0; }
      .data-profile-card { grid-column: 1 / -1; position: relative; overflow: hidden; min-height: 112px; padding: 11px 12px; background: linear-gradient(135deg, var(--navy), color-mix(in srgb, var(--navy) 72%, var(--clay))); color: var(--cream); display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 10px; align-items: center; }
      .data-profile-card span { display: inline-block; color: var(--mustard); font-size: 9px; letter-spacing: 2px; font-weight: 900; text-transform: uppercase; }
      .data-profile-card h2 { margin: 4px 0 4px; font-family: "Archivo", sans-serif; font-size: clamp(18px, 1.45vw, 22px); line-height: .95; letter-spacing: -.04em; text-wrap: balance; }
      .data-profile-card p { margin: 0; max-width: 300px; font-size: 9.5px; line-height: 1.22; color: color-mix(in srgb, var(--cream) 88%, transparent); font-weight: 650; }
      .data-pulse { display: grid; align-items: end; grid-template-columns: repeat(3, 10px); gap: 5px; height: 52px; padding: 7px; border: 1px solid color-mix(in srgb, var(--cream) 22%, transparent); background: color-mix(in srgb, var(--cream) 9%, transparent); }
      .data-pulse i { display: block; width: 10px; border-radius: 999px 999px 0 0; background: var(--mustard); box-shadow: 0 0 18px color-mix(in srgb, var(--mustard) 55%, transparent); }
      .data-pulse i:nth-child(1) { height: 26px; }
      .data-pulse i:nth-child(2) { height: 42px; background: var(--clay); }
      .data-pulse i:nth-child(3) { height: 34px; }
      .metric { background: var(--ivory); padding: 7px 10px; display: flex; flex-direction: column; justify-content: space-between; border-left: 4px solid var(--clay); min-height: 62px; }
      .metric-1 { border-left-color: var(--navy); } .metric-2 { border-left-color: var(--mustard); } .metric-3 { border-left-color: var(--ink); }
      .metric strong { font-family: "Archivo", sans-serif; font-weight: 900; font-size: clamp(28px, 2.6vw, 36px); letter-spacing: -.04em; color: var(--clay); }
      .metric-1 strong { color: var(--navy); } .metric-2 strong { color: var(--mustard); } .metric-3 strong { color: var(--ink); }
      .metric span { color: var(--ink); font-size: 10px; line-height: 1.2; letter-spacing: 1.2px; font-weight: 800; text-transform: uppercase; }
      .norma-block { grid-area: norma; background: var(--mustard); color: #181613; padding: clamp(18px, 2.1vw, 28px); position: relative; overflow: hidden; display: grid; grid-template-columns: 1fr auto; gap: 22px; align-items: center; }
      .norma-stripe { position: absolute; inset: 0 0 0 auto; width: 55%; background: var(--clay); clip-path: polygon(40% 0,100% 0,100% 100%,0 100%); opacity: .94; }
      .norma-copy, .ai-mark { position: relative; z-index: 1; }
      .norma-block h2 { color: #181613; font-size: clamp(42px, 5vw, 62px); }
      .norma-block p:not(.eyebrow) { max-width: 590px; margin: 0; font-size: clamp(13px, 1.05vw, 15px); line-height: 1.45; font-weight: 650; }
      .doc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
      .doc-tags span { font-family: "Archivo", sans-serif; font-size: 11px; font-weight: 900; letter-spacing: 1.8px; padding: 6px 12px; background: #181613; color: var(--mustard); }
      .ai-mark { text-align: right; color: var(--cream); }
      .ai-mark strong { display: block; font-family: "Archivo", sans-serif; font-size: clamp(70px, 7vw, 110px); line-height: .85; letter-spacing: -.06em; }
      .ai-mark span { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; font-size: 11px; font-weight: 900; letter-spacing: 1.4px; text-transform: uppercase; background: #181613; padding: 8px 12px; }
      .panel-block, .projects-block, .tools-block { min-width: 0; min-height: 0; }
      .skills-block { grid-area: skills; background: var(--paper); border: 1px solid var(--line); padding: clamp(16px, 1.8vw, 22px); display: flex; flex-direction: column; }
      .projects-block { grid-area: proj; background: #181613; color: #F4ECD8; padding: 8px 12px; display: flex; flex-direction: column; }
      .tools-block { grid-area: tools; background: var(--clay); color: var(--cream); padding: 8px 10px; display: flex; flex-direction: column; }
      .section-head { display: flex; align-items: center; gap: 10px; }
      .section-head span { font-family: "Archivo", sans-serif; font-weight: 900; font-size: 22px; letter-spacing: -1px; }
      .section-head strong { font-size: 10px; letter-spacing: 2.4px; font-weight: 900; text-transform: uppercase; color: var(--ink); }
      .section-head.inverted strong { color: #F4ECD8; }
      .section-head i { flex: 1; height: 2px; opacity: .5; }
      .projects-block .section-head, .tools-block .section-head { gap: 7px; }
      .projects-block .section-head span, .tools-block .section-head span { font-size: 18px; }
      .projects-block .section-head strong, .tools-block .section-head strong { font-size: 8.5px; letter-spacing: 1.7px; }
      .skills-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 28px; margin-top: 14px; }
      .skill-card h3 { margin: 0; color: var(--ink); font-size: clamp(13px, 1vw, 15px); letter-spacing: -.01em; }
      .skill-top { display: flex; align-items: baseline; gap: 8px; }
      .skill-top h3 { flex: 1; }
      .skill-top strong { color: var(--clay); font-family: "Archivo", sans-serif; font-size: 24px; letter-spacing: -.04em; }
      .skill-top span { font-size: 12px; opacity: .65; }
      .skill-track { height: 7px; background: var(--ivory); margin-top: 6px; overflow: hidden; }
      .skill-track i { display: block; height: 100%; }
      .skill-card p { color: var(--muted); margin: 5px 0 0; font-size: 11px; line-height: 1.35; }
      .projects-list { display: grid; gap: 0; margin-top: 4px; }
      .projects-list a { display: grid; grid-template-columns: 22px minmax(0, 1fr) auto 12px; align-items: center; gap: 5px; padding: 2px 0; border-bottom: 1px solid rgba(244,236,216,.18); color: #F4ECD8; }
      .projects-list a.featured-project { margin: 1px -4px 0; padding: 3px 4px; border: 1px solid rgba(244,201,93,.65); background: linear-gradient(135deg, rgba(244,201,93,.16), rgba(224,120,93,.18)); box-shadow: inset 4px 0 0 #F4C95D; }
      .projects-list span { font-family: "Archivo", sans-serif; font-weight: 900; font-size: 10px; color: #F4C95D; }
      .projects-list strong { font-size: 10px; color: #FFF3D7; }
      .projects-list em { font-style: normal; font-size: 8px; opacity: .86; color: #F4ECD8; white-space: nowrap; }
      .projects-list a.featured-project em { color: #F4C95D; font-weight: 900; opacity: 1; }
      .projects-list b { color: #F4C95D; }
      .tools-grid { margin-top: 5px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; flex: 1; }
      .tools-grid article { background: color-mix(in srgb, var(--cream) 13%, transparent); border: 1px solid color-mix(in srgb, var(--cream) 24%, transparent); padding: 3px 2px; display: grid; place-items: center; gap: 2px; min-height: 35px; }
      .tools-grid article div { width: 20px; height: 20px; display: flex; }
      .tools-grid span { color: var(--cream); text-align: center; font-size: 6.7px; line-height: 1.02; font-weight: 900; }
      .available { margin: 4px 0 0; display: flex; align-items: center; gap: 6px; color: var(--mustard); font-size: 7px; letter-spacing: .9px; font-weight: 900; text-transform: uppercase; }
      .available i { width: 8px; height: 8px; border-radius: 50%; background: var(--mustard); box-shadow: 0 0 8px var(--mustard); }
      [data-theme="dark"] body { background: #030A18; }
      [data-theme="dark"] #frame { box-shadow: 0 30px 90px rgba(0,0,0,.6); }
      [data-theme="dark"] .norma-block { color: #17120B; }
      [data-theme="dark"] .projects-block { background: #0B1020; color: #FFF3D7; border: 1px solid #31405F; }
      @media (max-width: 1100px) {
        #stage { place-items: start center; }
        #frame { min-height: auto; }
        .bauhaus-cv {
          overflow: visible;
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto;
          grid-template-areas:
            "topbar topbar"
            "hero photo"
            "metrics metrics"
            "norma norma"
            "skills skills"
            "proj tools";
        }
        .topbar { flex-wrap: wrap; }
        .top-actions { width: 100%; margin-left: 0; justify-content: flex-start; flex-wrap: wrap; }
        .photo-block { min-height: 340px; }
      }
      @media (max-width: 720px) {
        html, body { overflow-x: hidden; }
        #stage { padding: 0; display: block; }
        #frame { width: 100%; min-height: 100dvh; box-shadow: none; }
        .bauhaus-cv {
          min-height: 100dvh;
          padding: 10px;
          gap: 10px;
          grid-template-columns: 1fr;
          grid-template-areas:
            "topbar"
            "hero"
            "photo"
            "metrics"
            "norma"
            "skills"
            "proj"
            "tools";
        }
        .topbar { gap: 10px; padding: 2px; }
        .topline, .kicker { display: none; }
        .top-actions { display: grid; grid-template-columns: auto 1fr auto; gap: 6px; }
        .top-link { min-width: 0; justify-content: center; padding: 9px; }
        .top-link span { display: none; }
        .theme-toggle { padding: 9px 10px; }
        .hero-block { min-height: 245px; padding: 24px 18px 20px; }
        .hero-block h1 { font-size: clamp(54px, 16vw, 72px); }
        .role-line { font-size: 12px; line-height: 1.35; }
        .hero-summary { font-size: 14px; }
        .watermark { font-size: 56px; }
        .photo-block { min-height: 315px; padding: 12px; }
        .photo-block img { min-height: 290px; }
        .metrics-block { grid-template-columns: repeat(2, minmax(0, 1fr)); padding: 10px; }
        .data-profile-card { min-height: 150px; grid-template-columns: 1fr; padding: 14px; }
        .data-profile-card h2 { font-size: clamp(28px, 8vw, 38px); }
        .data-profile-card p { max-width: none; font-size: 13px; }
        .data-pulse { display: none; }
        .metric { min-height: 88px; }
        .metric span { font-size: 9px; overflow-wrap: anywhere; }
        .norma-block { display: block; padding: 20px 16px; }
        .norma-stripe { width: 70%; opacity: .25; }
        .norma-block h2 { font-size: clamp(40px, 12vw, 56px); }
        .norma-block p:not(.eyebrow) { font-size: 14px; }
        .ai-mark { text-align: left; margin-top: 14px; }
        .ai-mark strong { display: none; }
        .skills-grid { grid-template-columns: 1fr; gap: 13px; }
        .projects-block { padding: 16px 18px; }
        .tools-block { padding: 14px 16px 12px; }
        .projects-block .section-head span, .tools-block .section-head span { font-size: 22px; }
        .projects-block .section-head strong, .tools-block .section-head strong { font-size: 10px; letter-spacing: 2.4px; }
        .projects-list { gap: 4px; margin-top: 12px; }
        .projects-list a { grid-template-columns: 30px 1fr 18px; padding: 8px 0; }
        .projects-list a.featured-project { margin: 4px 0 0; padding: 10px; }
        .projects-list span { font-size: 12px; }
        .projects-list strong { font-size: 12px; }
        .projects-list em { font-size: 10px; }
        .projects-list em { grid-column: 2; white-space: normal; }
        .projects-list b { grid-column: 3; grid-row: 1 / span 2; }
        .tools-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .tools-grid article { min-height: auto; padding: 8px 4px 7px; gap: 5px; }
        .tools-grid article div { width: 38px; height: 38px; }
        .tools-grid span { font-size: 9.5px; }
      }
      @media (max-width: 390px) {
        .brand { font-size: 22px; }
        .theme-toggle span { display: none; }
        .hero-block h1 { font-size: 50px; }
        .tools-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="stage">
      <div id="frame"><div id="root"></div></div>
    </div>

    <script type="text/babel" src="variants/shared.jsx?v=6"></script>
    <script type="text/babel" src="variants/tool-icons.jsx?v=6"></script>
    <script type="text/babel" src="variants/C-bauhaus.jsx?v=6"></script>
    <script type="text/babel">
      const { BauhausCV } = window;
      ReactDOM.createRoot(document.getElementById("root")).render(<BauhausCV />);
    </script>
  </body>
</html>
